# .github/workflows/terraform.yml

name: Terraform CI/CD

on:
  push:
    branches: [dev, staging, main]    # triggers on these branches
  pull_request:
    branches: [staging, main]         # plan runs on PRs too

env:
  AWS_REGION: eu-west-1

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 — Login to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Step 3 — Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      # Step 4 — Set environment based on branch
      - name: Set environment
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ENV=prod" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "ENV=staging" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      # Step 5 — Terraform Init
      - name: Terraform Init
        run: terraform init
        working-directory: environments/${{ env.ENV }}

      # Step 6 — Terraform Plan (always runs)
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: environments/${{ env.ENV }}

      # Step 7 — Terraform Apply
      # Only runs on push to branch (not on PRs)
      # Dev applies automatically
      # Staging + Prod need manual approval in GitHub
      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        working-directory: environments/${{ env.ENV }}


Step 4 → CI/CD Pipeline
          dev    → auto plan + apply
          staging → plan + approval + apply
          prod   → plan + approval + app
